<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Sports Live Stream</title>
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        /* CSS ভেরিয়েবল এবং বেসিক সেটআপ */
        :root {
            --primary-color: #ff2e2e; /* লাইভ রেড কালার */
            --accent-color: #00e5ff; /* স্পোর্টস ব্লু */
            --bg-dark: #0f172a;
            --text-light: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            overflow-x: hidden;
        }

        h1, h2, h3 {
            font-family: 'Teko', sans-serif;
            text-transform: uppercase;
        }

        /* হেডার ডিজাইন */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            position: absolute;
            width: 100%;
            z-index: 100;
        }

        .logo {
            font-size: 2rem;
            font-weight: bold;
            color: var(--text-light);
            letter-spacing: 2px;
        }

        .logo span {
            color: var(--primary-color);
        }

        .nav-btn {
            background: transparent;
            border: 2px solid var(--accent-color);
            color: var(--accent-color);
            padding: 10px 25px;
            font-weight: bold;
            text-decoration: none;
            transition: 0.3s;
            border-radius: 5px;
        }

        .nav-btn:hover {
            background: var(--accent-color);
            color: var(--bg-dark);
        }

        /* হিরো সেকশন (মেইন ব্যানার) */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            /* নিচের এই লিংকে তুমি তোমার মেইন ব্যাকগ্রাউন্ড ইমেজ বসাবে */
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://khelnow.com/_next/image?url=https%3A%2F%2Fassets.khelnow.com%2Fnews%2Fuploads%2F2026%2F01%2FUFC-324-Gaethje-vs-Pimblett.png&w=1920&q=75');
            background-size: cover;
            background-position: center;
        }

        .hero h1 {
            font-size: 5rem;
            line-height: 1;
            margin-bottom: 20px;
            animation: fadeInDown 1s ease;
        }

        .live-tag {
            background-color: var(--primary-color);
            color: white;
            padding: 5px 15px;
            font-weight: bold;
            border-radius: 5px;
            margin-bottom: 20px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            animation: pulse 1.5s infinite;
        }

        .live-dot {
            width: 10px;
            height: 10px;
            background: white;
            border-radius: 50%;
        }

        /* কাউন্টডাউন টাইমার ডিজাইন */
        .countdown-container {
            display: flex;
            gap: 30px;
            margin: 40px 0;
            flex-wrap: wrap;
            justify-content: center;
        }

        .time-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 10px;
            min-width: 100px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .time-box span {
            display: block;
            font-size: 3rem;
            font-family: 'Teko', sans-serif;
            font-weight: 700;
            color: var(--accent-color);
        }

        .time-box p {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* মেইন কল টু অ্যাকশন বাটন */
        .cta-btn {
            background: linear-gradient(45deg, #ff0000, #ff5e00);
            color: white;
            padding: 15px 40px;
            font-size: 1.5rem;
            font-family: 'Teko', sans-serif;
            text-decoration: none;
            border-radius: 50px;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 0 20px rgba(255, 46, 46, 0.5);
            margin-top: 20px;
        }

        .cta-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(255, 46, 46, 0.8);
        }

        /* আপকামিং ইভেন্ট সেকশন */
        .events-section {
            padding: 80px 50px;
            background: #0b1120;
        }

        .section-title {
            text-align: center;
            font-size: 3rem;
            margin-bottom: 50px;
        }

        .events-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .event-card {
            background: #1e293b;
            border-radius: 15px;
            overflow: hidden;
            transition: 0.3s;
            position: relative;
        }

        .event-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 30px rgba(0, 229, 255, 0.2);
        }

        .card-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .card-content {
            padding: 20px;
        }

        .card-title {
            font-size: 1.5rem;
            margin-bottom: 10px;
            color: var(--accent-color);
        }

        .card-info {
            font-size: 0.9rem;
            margin-bottom: 20px;
            color: #94a3b8;
        }

        .watch-btn {
            display: block;
            width: 100%;
            padding: 10px;
            text-align: center;
            background: transparent;
            border: 1px solid var(--text-light);
            color: var(--text-light);
            text-decoration: none;
            border-radius: 5px;
            transition: 0.3s;
        }

        .watch-btn:hover {
            background: var(--text-light);
            color: var(--bg-dark);
        }

        /* অ্যানিমেশন সমূহ */
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* মোবাইল রেস্পন্সিভ */
        @media (max-width: 768px) {
            .hero h1 { font-size: 3rem; }
            .countdown-container { gap: 15px; }
            .time-box span { font-size: 2rem; }
            header { padding: 20px; }
        }
    </style>
</head>

    <script>
        // ==========================================
        // খুব গুরুত্বপূর্ণ: নিচের এই তারিখটি পরিবর্তন করো
        // ফরম্যাট: "Month Day, Year Time"
        // উদাহরণ: "Jan 30, 2026 20:00:00"
        // ==========================================
        
        const eventDate = new Date("Jan 30, 2026 20:00:00").getTime();

        // ==========================================
        
        const countdownFunction = setInterval(() => {
            const now = new Date().getTime();
            const distance = eventDate - now;

            // সময়ের হিসাব
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            // HTML এ আউটপুট দেখানো
            document.getElementById("days").innerText = days < 10 ? "0" + days : days;
            document.getElementById("hours").innerText = hours < 10 ? "0" + hours : hours;
            document.getElementById("minutes").innerText = minutes < 10 ? "0" + minutes : minutes;
            document.getElementById("seconds").innerText = seconds < 10 ? "0" + seconds : seconds;

            // সময় শেষ হয়ে গেলে যা হবে
            if (distance < 0) {
                clearInterval(countdownFunction);
                document.querySelector(".countdown-container").innerHTML = "<h2 style='font-size:3rem; color:#ff2e2e;'>LIVE NOW!</h2>";
                // সময় শেষ হলে টেক্সট পরিবর্তন হয়ে 'LIVE NOW' দেখাবে
            }
        }, 1000);
    </script>
